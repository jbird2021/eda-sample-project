---
- name: Listen for events on a webhook from webhook
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002
  rules:
    - name: Read raw payload 
      condition: #event.payload is defined
        any:
          - events.meta is defined
          - events.payload is defined
          - events.payload.message == "Ansible is super cool!"
      action: 
        debug:
          var: events.payload
