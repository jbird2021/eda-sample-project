---
- name: Listen for events on a webhook from webhook
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002
  rules:
    - name: Read raw payload 
      condition: 
        #- event.payload.message == "Ansible is super cool1!" or event.payload.message == "Ansible is super cool!"
        any:
          - event.meta is defined 
          - event.payload is defined
          - event.payload.message == "Ansible is super cool1!"
          - event.payload.message == "Ansible is super cool!"
      action: 
        debug:
          var: event.payload.message
