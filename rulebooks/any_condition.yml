
---
- name: Listen for events on a webhook from webhook
  hosts: localhost
  gather_facts: true
  become: true
  
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5002
  rules:
    - name: Read raw payload 
      condition:
        any:
          - event.target_os == "linux"
          - event.target_os == "windows"
  action:
    debug:
